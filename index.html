<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מדריך Claude Code - עברנו לגרסה חדשה!</title>
    <meta name="description" content="המדריך עבר לגרסה חדשה ומפורטת יותר - לחצו כאן למעבר">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Heebo', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #5A9030 0%, #70B040 50%, #8BC34A 100%);
            color: #2D2D2D;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 50px 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }

        .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 28px;
            font-weight: 900;
            color: #2D2D2D;
            margin-bottom: 16px;
            line-height: 1.4;
        }

        .message {
            font-size: 19px;
            color: #555;
            line-height: 1.8;
            margin-bottom: 32px;
        }

        .cta-button {
            display: inline-block;
            background: linear-gradient(135deg, #5A9030, #70B040);
            color: white;
            text-decoration: none;
            padding: 16px 40px;
            border-radius: 12px;
            font-size: 20px;
            font-weight: 700;
            font-family: 'Heebo', Arial, sans-serif;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(90, 144, 48, 0.3);
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(90, 144, 48, 0.4);
        }

        .footer {
            margin-top: 30px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
        }

        @media (max-width: 480px) {
            .card {
                padding: 36px 24px;
            }
            h1 {
                font-size: 22px;
            }
            .message {
                font-size: 17px;
            }
            .cta-button {
                padding: 14px 32px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🚀</div>
        <h1>המדריך עבר שדרוג!</h1>
        <p class="message">
            יצרתי מדריך חדש, מקיף ומפורט הרבה יותר
            <br>
            עם כל מה שצריך לדעת על Claude Code
        </p>
        <a href="https://tomhagiladi.github.io/claude-code-guide/" class="cta-button">
            למדריך החדש והמלא &larr;
        </a>
    </div>
    <div class="footer">Made by Tom Hagiladi using Claude Code</div>
</body>
</html>
